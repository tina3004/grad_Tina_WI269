<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

    <script src="script.js"></script>
</head>
<body class="d-flex flex-column min-vh-100" onload="display('home')">

<header class="bg-dark text-white text-center p-3">
    <h1>OUR BANK</h1>
    <h5>Banking at your doorstep</h5>
</header>

<div class="container-fluid flex-grow-1">
    <div class="row h-100">

        <div class="col-md-2 p-4">
            <div class="list-group">
                <button class="list-group-item list-group-item-action" onclick="display('home')">HOME</button>
                <button class="list-group-item list-group-item-action" onclick="display('about')">ABOUT US</button>
                <button class="list-group-item list-group-item-action" onclick="display('services')">SERVICES</button>
                <button class="list-group-item list-group-item-action" onclick="display('netbanking')">NETBANKING</button>
                <button class="list-group-item list-group-item-action" onclick="display('contact')">CONTACT US</button>
            </div>
        </div>

        <div class="col-md-10 bg-light p-5" id="content">
        </div>

    </div>
</div>

<footer class="bg-dark text-white text-center p-3">
    <p><a href="www.ourbank.com" class="text-white">www.ourbank.com</a></p>
    <p>Copyright. All rights reserved.</p>
</footer>

</body>
</html>
